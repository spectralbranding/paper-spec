results:
  - claim_id: "C1"
    status: supported
    notes: >
      Mathematically demonstrated for multiplicative wealth dynamics. The argument
      is clearest in the discrete-time case with the simple gamble illustration.
      The generalization to continuous time uses Ito's lemma. Note: Doctor et al.
      (2020) contest the claim that EUT requires ergodicity, arguing that EUT can
      be formulated for non-ergodic processes via appropriate utility function
      specification. This debate is ongoing.

  - claim_id: "C2"
    status: supported
    notes: >
      Demonstrated analytically and via simulation for the illustrative gamble.
      The ensemble average grows at +5% per period while the time-average decays
      at approximately -5% per period. The divergence is dramatic: after 100 periods,
      E[W] = W(0) * 1.05^100 but median(W) = W(0) * 0.95^100. No empirical test
      of the claim in longitudinal wealth data is performed in the paper.

  - claim_id: "C3"
    status: supported
    notes: >
      Derived analytically. The Kelly fraction follows from the first-order condition
      of time-average optimization. No empirical test of whether human subjects
      converge to Kelly betting in the paper itself; such tests exist in the
      experimental economics literature with mixed results.

  - claim_id: "C4"
    status: inconclusive
    notes: >
      The theoretical argument that loss aversion can be reinterpreted as rational
      under multiplicative dynamics is sound for certain parameter regimes. However,
      this is a re-interpretation of existing results, not a prediction of new ones.
      Critics (including behavioral economists) note that prospect theory's predictions
      extend beyond the cases Peters analyzes. The reinterpretation is partial, not
      complete. Empirical test comparing the two accounts has not been performed
      in a pre-registered study.

limitations:
  - description: >
      The core ergodicity argument is demonstrated for a specific class of
      multiplicative wealth dynamics (iid returns). Many economic processes are
      more complex (mean-reverting, fat-tailed, correlated). The ergodicity
      framework generalizes to these cases in principle but the paper does not
      develop those extensions.
    severity: moderate
    addressable: true

  - description: >
      The claim that behavioral economics findings (C4) can be fully explained by
      ergodicity is contested. Doctor et al. (2020) in Nature Physics argue that
      the ergodicity framework and expected utility theory are equivalent when
      utility functions are appropriately chosen, and that Peters' results are
      not as novel as claimed.
    severity: major
    addressable: true

  - description: >
      No empirical validation is provided in the paper. All claims rest on
      mathematical argument and numerical illustration with a single stylized
      gamble. The question of whether real economic agents' behavior is better
      predicted by time-average optimization than EUT has not been tested in
      the paper.
    severity: major
    addressable: true

  - description: >
      The paper assumes that the relevant time horizon for individual agents is
      long enough for the time-average to dominate. For short time horizons (a
      single decision, a month, a year), the distinction between time-average and
      ensemble-average optimization may be practically negligible. The paper does
      not characterize at what time horizon the two approaches give meaningfully
      different prescriptions.
    severity: moderate
    addressable: true

  - description: >
      The reinterpretation of loss aversion (C4) applies to symmetric gambles around
      the current wealth level. Many behavioral economics experiments use gambles that
      are small relative to total wealth, where the ergodicity reinterpretation
      predicts different behavior than is actually observed. The scope conditions for
      C4 are not fully characterized.
    severity: moderate
    addressable: true
