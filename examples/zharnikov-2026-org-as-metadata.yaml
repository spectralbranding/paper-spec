# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026): Organizations as Coordination Overhead Made Structural
spec_version: "0.1.0"

meta:
  title: "Organizations as Coordination Overhead Made Structural: A Temporal Hierarchy Theory"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19024230"
  date: "2026-03-01"
  version: "1.0"
  venue: "Working Paper (Zenodo); desk-rejected at Organization Theory (OT-26-0095, 2026-04-28, Markus Höllerer Co-Editor); queued for substantial rewrite; next target Organization Science"
  license: "CC-BY-4.0"
  keywords:
    - temporal hierarchy
    - organizational form
    - coordination costs
    - organizational metamerism
    - process ontology
    - AI and organizations
    - meta-organization
    - firm boundaries
    - tacit knowledge

claims:
  - id: "D1"
    type: definition
    statement: >
      The value layer consists of the goals and outcomes that a value-creating activity
      is intended to produce. Value is defined from the perspective of the intended recipient.
      It is stable in the sense that the rate of change in value specification is slower —
      by orders of magnitude — than the rate of change in the processes that deliver it or
      the organizational forms that execute those processes. The hierarchy is a claim about
      relative rates of change, not about ontological immutability.
    formal: "stability(Value) >> stability(Process) >> stability(Organization)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: []

  - id: "D2"
    type: definition
    statement: >
      The process layer consists of the sequences of activities that transform inputs into
      the value outputs specified at the value layer. Processes are operationally specifiable:
      they can be written down, transmitted, and taught.
    formal: "Process: Inputs -> Outputs; specifiable as a sequence of transformations"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "D3"
    type: definition
    statement: >
      The organizational layer consists of the configuration of agents, roles, reporting
      structures, resource allocation rules, and toolsets assembled to execute a given set
      of processes. Organizations are metadata for their processes: a configuration layer
      that specifies how processes are instantiated, coordinated, and resourced, without
      containing the process itself.
    formal: "Org = Metadata(Process); Org specifies how Process is executed, not what it produces"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2"]

  - id: "D4"
    type: definition
    statement: >
      Two organizational configurations are metamers with respect to a given process and
      a given value output if they produce functionally equivalent value outputs when executing
      the same underlying process. The equivalence is process-relative and value-output-relative:
      configurations that are metamers for one process may not be metamers for another.
      This is a state equivalence, distinct from equifinality (path equivalence).
    formal: "Org_A ~_P Org_B iff Value_output(Org_A, P) = Value_output(Org_B, P)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2", "D3"]

  - id: "P1"
    type: proposition
    statement: >
      Value goals change less frequently than the processes that produce them, and processes
      change less frequently than the organizational configurations that execute them.
      This holds across industries, technological eras, and national contexts.
    formal: "E[T_value] >> E[T_process] >> E[T_org_form] across historical sample"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2", "D3"]

  - id: "C1"
    type: corollary
    statement: >
      Reorganizations that preserve process integrity while changing organizational form
      should produce no loss of value output. Reorganizations that disrupt processes will
      produce value loss regardless of how well the organizational form is designed.
    formal: "If Process(t+1) = Process(t) and Org(t+1) ≠ Org(t), then Value_output(t+1) = Value_output(t)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["P1", "D3"]

  - id: "P2"
    type: proposition
    statement: >
      For any given value-producing process, multiple distinct organizational configurations
      exist that produce functionally equivalent value outputs. The size of the metamerism
      set increases as coordination costs decrease.
    formal: "|Metamerism_set(P)| is increasing in (1 / coordination_cost)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D2", "D3", "D4"]

  - id: "P3"
    type: proposition
    statement: >
      As AI reduces the marginal cost of coordination, the rate of change of organizational
      form (as measured by frequency of restructuring events) increases, while the rate of
      change of process (as measured by frequency of material changes to production workflow)
      remains stable or increases more slowly.
    formal: "d(restructuring_frequency)/d(AI_adoption) > d(process_change_frequency)/d(AI_adoption)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D3", "P1"]

  - id: "P4"
    type: proposition
    statement: >
      As coordination costs approach zero, the minimum viable organizational overhead for
      a given process approaches the specification of that process's interfaces: the information
      about what inputs the process requires, what outputs it produces, and what quality
      standards it must meet. The organizational layer is compressed toward the protocol layer.
    formal: "lim_{c -> 0} Overhead(P, c) = Interface_spec(P)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D3", "P1", "P3"]

  - id: "P4a"
    type: proposition
    statement: >
      The degree of organizational metadata compression achievable for a given process is
      inversely proportional to the ratio of tacit to explicit knowledge required by that
      process. In high-tacit-knowledge domains (creative work, complex negotiation, innovation
      under ambiguity), organizational form will remain structurally thick and resistant to
      AI-driven volatility.
    formal: "Compression(P) ~ 1 / (tacit_ratio(P)); Headless_firm is a limiting case for codifiable work only"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D3", "P4"]

  - id: "P5"
    type: proposition
    statement: >
      Organizational form shapes stakeholder evaluations independently of process output.
      The metamerism set is wider for technical or algorithmic observers (who evaluate
      primarily on output) and narrower for social or institutional observers (who evaluate
      on form, provenance, and legitimacy). The choice of organizational form is therefore
      simultaneously a governance decision and an act of strategic impression management
      that constrains the firm's future competitive positioning.
    formal: "|Metamerism_set(P, algorithmic_observer)| > |Metamerism_set(P, institutional_observer)|"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D3", "D4"]

methodology:
  type: theoretical
  design: >
    Formal theory construction synthesizing process ontology (Tsoukas & Chia, 2002), transaction
    cost economics (Coase, 1937; Williamson, 1985), pace layering (Brand, 1999; Beane &
    Leonardi, 2025), dynamic capabilities (Teece et al., 1997), and signaling theory
    (Spence, 1973). Six testable propositions derived (P1, P2, P3, P4, P4a, P5). No primary
    empirical data collected. Historical cases used for illustrative support: shelter/communication
    value stability across millennia, Toyota TPS as coordination absorption mechanism,
    API-first architecture as digital metadata, platform ecosystems as pure metadata.
  analysis:
    method: >
      Conceptual synthesis; formal proposition derivation; comparative theoretical positioning
      against equifinality (Gresov & Drazin, 1997); historical case illustration; Table 1
      comparative ontologies; Table 2 metadata decision matrix
    software: "None"

acceptance:
  - claim_id: "P1"
    criterion: >
      Historical analysis showing that, across a sample of industries and time periods, the
      mean time between material changes in value proposition exceeds the mean time between
      material changes in production processes, which exceeds the mean time between material
      changes in organizational form. Effect holds at the industry level.
    falsification: >
      A systematic finding that organizational form is more stable than production process across
      industries and time periods. Or evidence that the stability ordering reverses in a
      specific theoretically identified class of organizations.

  - claim_id: "P2"
    criterion: >
      Controlled comparison of firms executing comparable processes under materially different
      organizational forms (in-house vs. outsourced, hierarchical vs. flat) showing no
      significant difference in value output quality on objective metrics. Variance in
      organizational form is higher in industries with lower coordination costs.
    falsification: >
      Systematic evidence that value output quality is higher for a specific class of
      organizational forms across a wide range of processes, independent of industry or
      technological context.

  - claim_id: "P3"
    criterion: >
      Time-series evidence showing that the frequency of restructuring events has increased
      in AI-early-adopter industries since widespread AI coordination tool adoption, while
      frequency of production process changes has not increased proportionally.
    falsification: >
      AI adoption is associated with equal increases in both organizational restructuring
      frequency and process change frequency, or restructuring frequency has not increased
      in AI-adopting firms.

  - claim_id: "P4"
    criterion: >
      Declining ratio of coordination staff (middle management, administrative personnel) to
      execution staff in AI-adopting firms, without associated declines in product quality
      or customer satisfaction scores.
    falsification: >
      AI adoption increases organizational overhead by creating new coordination work categories
      (AI oversight, model governance) that grow faster than the coordination work they replace.

  - claim_id: "P5"
    criterion: >
      Experimental vignette evidence showing stakeholder cohorts evaluate organizations
      differently under identical output descriptions paired with different organizational form
      descriptions. Effect significant for social/institutional evaluators; attenuated for
      technical evaluators.
    falsification: >
      Organizational form has no significant effect on stakeholder evaluations when output
      is held constant, or the effect is uniform across observer types.

data:
  available: false
  url: ""
  notes: >
    No primary data collected. Historical cases (shelter, communication value stability)
    are illustrative, not formally coded. Toyota TPS and platform ecosystem examples are
    drawn from published literature. All propositions require future empirical testing.

code:
  available: false
  url: ""
  notes: >
    The paper is entirely theoretical. No computational tools are used or developed.
    Table 2 (Metadata Decision Matrix) is a managerial heuristic, not a computational model.

replication:
  feasible: true
  estimated_cost: "< $30,000 USD (archival data + survey + experimental vignette)"
  estimated_time: "12-24 months"
  requirements:
    - "Historical dataset of organizational restructuring events with timestamps across industries"
    - "Value proposition stability measures for matched firm-process pairs"
    - "AI adoption intensity measures by firm and business unit"
    - "Experimental vignette design for P5 (stakeholder evaluation under organizational form variation)"
    - "Coordination staff ratio data from SEC filings or equivalent"

