results:
  - claim_id: "P1"
    status: not_tested
    notes: >
      Supported by historical illustration across three domains (shelter, communication,
      dispute resolution) showing value stability across millennia, process stability across
      decades-centuries, and organizational form volatility across years-decades. Not formally
      coded or statistically tested.

  - claim_id: "P2"
    status: not_tested
    notes: >
      The organizational metamerism concept is novel. Related to but distinct from equifinality
      (Gresov & Drazin, 1997). No controlled comparison of organizational forms executing
      the same process with output measurement has been conducted to test this claim.

  - claim_id: "P3"
    status: not_tested
    notes: >
      Consistent with the empirical phenomenon of accelerating organizational restructuring
      since AI adoption. Formal time-series test with AI adoption measures and restructuring
      frequency data has not been conducted.

  - claim_id: "P4"
    status: not_tested
    notes: >
      Directional evidence from platform firm case studies and headless enterprise examples.
      Formal declining-ratio test with AI adoption controls has not been executed.

  - claim_id: "P4a"
    status: not_tested
    notes: >
      Tacit knowledge boundary is an established theoretical constraint (Polanyi, 1966;
      Grant, 1996). The cross-industry comparison design for testing the moderation by
      tacit-to-explicit knowledge ratio has not been implemented.

  - claim_id: "P5"
    status: not_tested
    notes: >
      Grounded in signaling theory (Spence, 1973) and institutional theory (Meyer & Rowan,
      1977). Experimental vignette design specified but not executed. The coffee company
      example (artisan roaster vs. corporate subsidiary as production metamers but perception
      non-equivalents) is illustrative, not empirical.

limitations:
  - description: >
      The temporal stability hierarchy is presented with historical illustration but without
      formal operationalization of what counts as a material change in value, process, or
      organizational form. Without agreed operational definitions, the claim is difficult
      to test systematically.
    severity: major
    addressable: true

  - description: >
      The metadata metaphor risks slipping into entity-based thinking by characterizing
      organizational form as a static file. The theory addresses this by clarifying that
      organizational metadata is the ostensive aspect of coordination routines (Pentland &
      Feldman, 2005) — alive but more volatile than what it coordinates. The tension with
      the strong process view requires ongoing theoretical work.
    severity: moderate
    addressable: true

  - description: >
      The metamerism set requires a measurable value output to be defined. For value outputs
      that are contested, multi-dimensional, or observer-relative, organizational configurations
      that appear equivalent on measurable dimensions may be perceived as qualitatively
      different — which is the organizational form as signal problem (P5). The overlap
      between P2 and P5 needs further theoretical clarification.
    severity: moderate
    addressable: true

  - description: >
      The theory assumes that process integrity can be preserved across organizational
      reconfigurations. This assumption weakens for tacit processes. Organizations whose
      core processes are highly tacit will have smaller metamerism sets and higher effective
      coordination costs, limiting AI coordination substitution. The location of the tacit
      boundary is not predicted by the theory.
    severity: moderate
    addressable: true

  - description: >
      No primary data collected. All propositions are theoretically derived and illustrated
      with existing empirical literature. Formal empirical validation requires future research
      program across multiple propositions.
    severity: major
    addressable: true

