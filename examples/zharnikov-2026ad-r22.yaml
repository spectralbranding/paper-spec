    doi: "10.5281/zenodo.19778549"
    url: "https://doi.org/10.5281/zenodo.19778549"
    version: "v1.0.0"
    date: "2026-04-26"
  - platform: "GitHub"
    url: "https://github.com/spectralbranding/sbt-papers/tree/main/r22-spectral-gap-restoration"

