spec_version: "0.1.0"

meta:
  title: "Verification as Operator: Why Acceptance Testing Succeeds Where Conventional Audit Fails"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
