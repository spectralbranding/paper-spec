claims:
  - id: "C1"
    type: proposition
    statement: >
      Organizational acceptance testing is algebraically equivalent to spectral
      projection onto the invariant Brand Function eigenspace.
    testable: false
    tested_in_paper: false
    status: theoretical
    depends_on: []

  - id: "C2"
    type: proposition
    statement: >
      Conventional audit (Power 1997) is a degenerate rank-1 projection;
      OST's six-level cascade is full-rank.
    testable: true
    tested_in_paper: true
    status: supported_by_simulation
    depends_on: ["C1"]
    falsification: >
      C2 is falsified if conventional audit can be shown to preserve the full
      dimensional structure of organizational performance (rank > 1) in practice.

  - id: "C3"
    type: proposition
    statement: >
      Three independent research lineages -- organizational cybernetics (Beer 1972;
      Beer 1984), behavioral organization theory (March and Simon 1958; Argyris and
      Schon 1978), and software engineering verification (Beck 2002) -- independently
      converge on the spectral projection structure without stating the algebraic identity.
    testable: false
    tested_in_paper: true
    status: theoretical
    depends_on: []

  - id: "C4"
    type: proposition
    statement: >
      The verification rate bound (Zharnikov 2026h) is the resource cost of maintaining
      a full-rank cascade; verification bandwidth bounds the maximum sustainable
      cascade rank.
    testable: false
    tested_in_paper: false
    status: theoretical
    depends_on: ["C2"]

methodology:
  type: theoretical_synthesis
  design: >
    Operator-theoretic formalization of organizational verification. Synthesis of three
    independent research lineages: cybernetics (Beer's variety attenuation), behavioral
    organization theory (March-Simon satisficing; Argyris-Schon double-loop learning),
    and software V&V (Beck TDD). Python simulation (Appendix B) confirms that rank-1
    audit misses approximately 90% of total organizational deviation across all noise levels.
  key_finding: >
    Rank-1 audit misses ~90% of deviation. Full-rank cascade localizes deviations
    and enables early correction at each cascade level.

