claims:
  - id: "D1"
    type: definition
    statement: >
      The Organizational Schema Theory (OST) is a reverse-design methodology that treats the
      organization as a testable specification. It structures organizational design through a
      six-level specification cascade (L0-L5) where customer experience goals function as
      acceptance tests, signal requirements as integration tests, and process contracts as
      unit tests, with a continuous CI/CD validation pipeline replacing periodic audits.
    formal: >
      Cascade levels: L0 (Customer Experience Contracts / Acceptance Tests),
      L1 (Signal Requirements / Integration Tests), L2 (Process Contracts / Unit Tests),
      L3 (Procedures / Implementation), L4 (Input Specifications / Dependencies),
      L5 (Sourcing Requirements / Infrastructure).
      Design direction: top-down (L0 to L5). Operation direction: bottom-up (L5 to L0).
      Validation: CI/CD pipeline on every specification change.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: []

  - id: "D2"
    type: definition
    statement: >
      Specification waste: any process, input specification, or sourcing requirement at
      any cascade level that has no upward traceability link to a Level 0 contract
      (experience, constraint, or commitment contract). Specification waste is detectable
      through automated traversal of the cascade — analogous to dead code detection in software.
    formal: >
      waste(node) := NOT EXISTS path from node to any L0 contract in cascade graph.
      Detection: depth-first traversal of cascade DAG from L5 upward; nodes with no
      path to L0 are flagged as waste.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "D3"
    type: definition
    statement: >
      Contract-procedure separation: Levels 0-2 define what must be achieved (executor-invariant
      specifications); Levels 3-5 define how to achieve it (executor-dependent implementation).
      When an executor type changes (human to automated, or vice versa), the contracts (tests)
      remain stable while only the procedures (implementation) change.
    formal: >
      contracts = {L0, L1, L2}: executor-invariant. procedures = {L3, L4, L5}: executor-dependent.
      Transition: for executor change E1 -> E2: contracts unchanged, procedures revised.
      Compliance verification: test-suite sharing (contracts public) vs. implementation
      monitoring (procedures private to executor).
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "P1"
    type: proposition
    statement: >
      Specification waste detection: In any operational system where processes are specified
      with explicit upward traceability to customer experience goals, processes without such
      traceability constitute specification waste that can be systematically identified and
      eliminated. The specification cascade makes this waste detectable through automated
      traversal — analogous to dead code detection in software.
    formal: >
      For any cascade specification C, automated traversal identifies waste(node) for all
      nodes with no path to any L0 contract. The Spectra Coffee demonstration identified 2
      out of ~25 processes as candidates for waste reclassification (equipment descaling,
      lighting adjustment — may be justified by constraint contracts rather than experience
      contracts, requiring explicit constraint linkage rather than deletion).
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["D1", "D2"]

  - id: "P2"
    type: proposition
    statement: >
      Traceability reduces diagnostic cost: Operations specified with backward traceability
      from every parameter to customer experience goals will identify the root cause of
      customer experience failures faster than operations without such traceability. When
      a customer experience goal fails, the cascade can be traced downward through signal
      requirements to process contracts to identify the responsible operational parameter.
    formal: >
      Let T_diag(OST) = time to root-cause identification with cascade traceability.
      Let T_diag(ISO) = time to root-cause identification without cascade traceability.
      Proposition: T_diag(OST) < T_diag(ISO) in expectation for equivalent operations.
      Testability: measure time-to-root-cause with and without specification traceability
      in controlled comparison.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "P3"
    type: proposition
    statement: >
      Contract-procedure separation enables knowledge transfer: Separating executor-invariant
      quality contracts from executor-dependent procedures enables operational knowledge
      transfer without prescribing implementation, reducing the information asymmetry in
      franchise and multi-site operations. The franchisor specifies outcomes and validates
      compliance through test results; the franchisee retains implementation autonomy.
    formal: >
      Information asymmetry reduction: franchisor shares contracts (L0-L2), not procedures
      (L3-L5). Compliance = test suite pass rate, not implementation monitoring.
      Prediction: compliance rates with test-suite-based franchising >= compliance rates
      with manual-based franchising, holding resource levels constant.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D3"]

  - id: "P4"
    type: proposition
    statement: >
      Continuous validation reduces conformance drift: Organizations using automated,
      per-change specification validation will exhibit less conformance drift between audits
      than organizations relying on periodic manual audits. OST's CI/CD pipeline validates
      the specification on every change, not periodically, eliminating the class of structural
      non-conformances (broken references, orphaned processes, missing traceability) that
      accumulate between periodic reviews.
    formal: >
      Let drift(OST) = non-conformances discovered per period with CI/CD validation.
      Let drift(ISO) = non-conformances discovered per period with periodic audit.
      Proposition: drift(OST) < drift(ISO) for equivalent operations.
      Structural mechanisms: (a) broken cross-reference detection on every commit;
      (b) orphaned process detection on every commit; (c) missing traceability flagged
      on every commit. ISO audit detects these only at planned intervals.
    testable: true
    tested_in_paper: true
    status: supported
    depends_on: ["D1"]

  - id: "P5"
    type: proposition
    statement: >
      Reverse-designed operations produce higher perceived quality: Operations designed
      backward from customer-experience acceptance tests will achieve higher customer-perceived
      quality than operations designed forward from available resources, holding resource
      levels constant. Making customer experience the structural starting point of operational
      design should produce higher perceived quality — analogous to TDD demonstrating
      different software architecture even with the same programmers and tools.
    formal: >
      Let Q_CX(reverse) = customer-perceived quality of reverse-designed operations.
      Let Q_CX(forward) = customer-perceived quality of forward-designed operations.
      Proposition: Q_CX(reverse) > Q_CX(forward) holding resources constant.
      Requires: controlled comparison of reverse-designed vs. forward-designed operations
      in same domain. Most complex empirical agenda among the five propositions.
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

methodology:
  type: theoretical
  design: >
    Design Science Research (DSR) following Hevner et al. (2004), situated within Gregor
    and Hevner's (2013) knowledge contribution framework as an exaptation — extending
    Test-Driven Development from software engineering to organizational specification.
    Structured as echeloned DSR (Mullarkey & Hevner, 2019): problem analysis, requirements
    specification, design, demonstration, formative evaluation. Primary contribution is
    design knowledge (technological rule). The demonstration artifact is Spectra Coffee:
    25 YAML files across L0-L5, CI/CD validation pipeline in GitHub Actions. Formative
    evaluation using FEDS framework (Venable et al., 2016) with 5 independent reviewers
    across distinct stakeholder perspectives (QA inspector, process consultant, academic
    researcher, professor with graduate student, coffee shop manager). Supplemented by
    structured analytical comparison of the same espresso preparation process documented
    in both ISO 9001 clause-compliant format and OST cascade format.
  analysis:
    method: >
      (1) Theoretical framework construction synthesizing TDD (Beck, 2003), service-dominant
      logic (Vargo & Lusch, 2004), lean reverse design (Ohno, 1988), and organizational
      information-processing theory (Galbraith, 1974; Thompson, 1967; Mintzberg, 1979).
      (2) Demonstration artifact: Spectra Coffee OST specification (25 YAML files, CI/CD
      pipeline). (3) Structured ISO 9001 comparative analysis: same process in both formats,
      systematic comparison of three structural gaps. (4) Formative expert evaluation:
      5 reviewers, 14 defects identified, all critical and major resolved.
    software: "GitHub Actions (CI/CD validation); YAML specification files"

acceptance:
  - claim_id: "P1"
    criterion: >
      In a set of OST-specified operations, automated cascade traversal identifies at least
      one process per 10 documented processes as specification waste candidates (no upward
      traceability to any L0 contract). The rate of waste identification should exceed that
      in conventionally documented (ISO 9001 style) operations, where waste is not detectable
      without manual analysis.
    falsification: >
      Automated traversal of OST-specified operations identifies zero waste candidates, or
      the identification rate in OST is no higher than in conventional documentation (ISO 9001).
      This would suggest that waste is either absent (organizations have good implicit traceability)
      or that OST's traversal algorithm produces false positives rather than genuine waste detection.

  - claim_id: "P2"
    criterion: >
      Controlled study: operators use OST cascade traceability to diagnose a simulated customer
      experience failure and achieve root-cause identification faster (by at least 30%) than
      operators using conventional ISO 9001 documentation for the same failure. Root cause
      is defined as the L2 process contract whose quality gate violation explains the L0
      acceptance test failure.
    falsification: >
      Time-to-root-cause does not differ significantly between OST and ISO 9001 conditions
      (p > .10), suggesting that experienced operators can reconstruct causal chains from
      conventional documentation as efficiently as from explicit traceability links.

  - claim_id: "P4"
    criterion: >
      Longitudinal comparison: organizations with CI/CD-validated specifications show fewer
      total non-conformances discovered at periodic internal audit than control organizations
      with equivalent operations managed via periodic audit only. The specific non-conformance
      categories addressed by CI/CD (broken cross-references, orphaned processes, missing
      traceability) should show reduction > 80%; other non-conformance categories need not differ.
    falsification: >
      CI/CD-validated organizations show no reduction in non-conformances at periodic audit.
      This would suggest that structural non-conformances (broken references, orphaned processes)
      are not a meaningful share of total quality system drift, or that periodic auditors already
      detect them efficiently.

  - claim_id: "P5"
    criterion: >
      Controlled comparison: comparable operations (same industry, similar resources) designed
      with OST reverse methodology vs. conventional forward design achieve statistically higher
      scores on customer-perceived quality measures (SERVQUAL, NPS, or equivalent) after 12
      months of operation.
    falsification: >
      Customer-perceived quality does not differ between reverse-designed and forward-designed
      operations when controlling for resources and industry. This would undermine the core
      claim that design sequence affects outcomes, suggesting that quality is determined by
      resources and execution rather than specification methodology.

data:
  available: false
  url: ""
  notes: >
    No field data collected. The demonstration artifact (Spectra Coffee) is a fictional
    specialty coffee operation. Formative evaluation provides qualitative expert assessments
    only. The ISO 9001 comparative analysis is analytical, not empirical. Empirical validation
    requires deployment in operating businesses and longitudinal measurement.

code:
  available: true
  url: "https://github.com/spectralbranding/config-org-demo"
  notes: >
    The public config-org-demo repository contains the Spectra Coffee specification artifact:
    25 YAML files across L0-L5 and the GitHub Actions CI/CD validation pipeline. This is the
    demonstration artifact from Section 5.1. The full private implementation is in the
    config-org repository (viberesearch/config-org).

replication:
  feasible: true
  estimated_cost: "< $5,000 USD (expert panel time + specification authoring)"
  estimated_time: "3-6 months"
  requirements:
    - "YAML specification authoring tooling (text editor + JSON Schema validator)"
    - "GitHub Actions or equivalent CI/CD platform for pipeline validation"
    - "Domain experts for formative evaluation (QA, operations, process management)"
    - "A well-documented operational domain (specialty coffee, retail, light manufacturing)"
    - "ISO 9001 documentation of the same domain for comparative analysis"

dependencies:
