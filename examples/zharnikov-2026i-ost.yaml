    relationship: "applies"
    critical: true

  - reference: "Vargo, S. L., & Lusch, R. F. (2004). Evolving to a new dominant logic for marketing. Journal of Marketing, 68(1), 1-17."
    claim: "Service-dominant logic: value is co-created in use and determined by the customer — provides the epistemological basis for Level 0 customer experience contracts"
    relationship: "applies"
    critical: true

  - reference: "van der Aalst, W. M. P. (2016). Process mining: Data science in action (2nd ed.). Springer."
    claim: "Conformance checking — OST extends conformance checking from process-level to full organizational specification with customer-experience traceability"
    relationship: "extends"
    critical: true

  - reference: "Hevner, A. R., March, S. T., Park, J., & Ram, S. (2004). Design science in information systems research. MIS Quarterly, 28(1), 75-105."
    claim: "Design Science Research methodology — OST follows DSR as its research methodology"
    relationship: "applies"
    critical: true

  - reference: "Galbraith, J. R. (1974). Organization design: An information processing view. Interfaces, 4(3), 28-36."
    claim: "Organizational design as information-processing problem — OST provides a digital-era upgrade of Galbraith's rules-and-programs strategy"
    relationship: "extends"
    critical: false

  - reference: "Thompson, J. D. (1967). Organizations in action. McGraw-Hill."
    claim: "Thompson's three interdependence types (pooled, sequential, reciprocal) map onto the cascade architecture"
    relationship: "applies"
    critical: false

  - reference: "Mintzberg, H. (1979). The structuring of organizations. Prentice-Hall."
    claim: "Mintzberg's coordinating mechanisms — OST demonstrates that three mechanisms (standardization of work processes, outputs, skills) can be applied simultaneously as nested cascade layers"
    relationship: "extends"
    critical: false

  - reference: "Ohno, T. (1988). Toyota production system: Beyond large-scale production. Productivity Press."
    claim: "Lean pull system and reverse design — customer signal propagates backward through production; foundational for OST's reverse-design principle"
    relationship: "applies"
    critical: false

  - reference: "Beer, S. (1972). Brain of the firm. Herder and Herder."
    claim: "Viable System Model — OST's six-level cascade maps to Beer's VSM systems S1-S5; CI/CD implements S3* (audit) as continuous structural invariant"
    relationship: "extends"
    critical: false

  - reference: "Simon, H. A. (1947). Administrative behavior. Macmillan."
    claim: "Bounded rationality and hierarchical decomposition — OST reduces cognitive bottleneck by making justification chains machine-traversable rather than memory-resident"
    relationship: "extends"
    critical: false

  - reference: "Polanyi, M. (1966). The tacit dimension. Doubleday."
    claim: "Tacit knowledge — OST's specification cascade is a mechanism for externalizing tacit operational knowledge into testable form"
    relationship: "applies"
    critical: false

  - reference: "Deming, W. E. (1986). Out of the crisis. MIT Press."
    claim: "Quality is defined by the customer — provides epistemological basis for centering Level 0 on customer experience"
    relationship: "applies"
    critical: false

results:
  - claim_id: "P1"
    status: partially_supported
    notes: >
      The Spectra Coffee ISO 9001 comparative analysis (Section 5.2) identified two processes
      (equipment descaling frequency, opening-time lighting adjustment) with no traceable
      connection to any customer experience goal. These are flagged as specification waste
      candidates. However, they may be justified by constraint contracts (equipment longevity,
      regulatory compliance) — the conventional documentation provides no mechanism to
      distinguish justified maintenance from organizational inertia. Formative evidence only;
      not a controlled empirical comparison.

  - claim_id: "P2"
    status: not_tested
    notes: >
      The diagnostic cost reduction claim is supported by theoretical argument (TDD analogy,
      root cause analysis literature) and illustrated through the espresso extraction example
      (Section 5.2: extraction time traces through satisfies_signal to craft_preparation_visible
      and satisfies_experience to taste_balanced_sweet_clean). No empirical measurement of
      time-to-root-cause conducted.

  - claim_id: "P3"
    status: not_tested
    notes: >
      The contract-procedure separation is demonstrated in the Spectra Coffee artifact
      (17 of 25 files = 68% define executor-invariant content at L0-L2; 8 files contain
      executor-dependent content at L3-L5). The franchise knowledge transfer claim is
      argued via Toyota production system precedent (Liker, 2004) but not tested empirically.

  - claim_id: "P4"
    status: partially_supported
    notes: >
      Three structural gaps identified in the ISO 9001 comparative analysis: Gap 1 (missing
      upward traceability), Gap 2 (silent cross-reference breakage detectable only at next
      audit), Gap 3 (no continuous validation mechanism). CI/CD pipeline validates four of
      six levels with zero errors in the demonstration artifact. Formative evidence only;
      longitudinal conformance drift comparison not conducted.

  - claim_id: "P5"
    status: not_tested
    notes: >
      The reverse-design quality advantage is the most ambitious proposition. It is motivated
      by TDD analogy and service-dominant logic but requires controlled empirical comparison
      of reverse-designed vs. forward-designed operations with equivalent resources. Not
      tested in this paper.

limitations:
  - description: >
      The demonstration artifact (Spectra Coffee) is fictional and covers a single business
      type (specialty coffee) — an unusually specification-friendly domain with measurable
      process parameters and documented quality standards. Validation across industries with
      higher regulatory complexity (healthcare), intangible outputs (consulting), or
      manufacturing would be required for generalizability claims.
    severity: major
    addressable: true

  - description: >
      All five propositions are stated but not empirically tested. The formative evaluation
      provides design-stage evidence only. Summative evidence from field deployment in
      operating businesses is absent.
    severity: major
    addressable: true

  - description: >
      Level 0 acceptance tests for customer experience are inherently qualitative. Goals
      such as "warm, competent, unhurried" require proxy metrics that capture partial aspects
      of desired experience. Whether proxies adequately represent customer perception connects
      to ongoing debates in service quality measurement (Parasuraman et al., 1985).
    severity: moderate
    addressable: true

  - description: >
      The CI/CD pipeline validates structural properties (schema integrity, cross-reference
      completeness, traceability coverage) but cannot validate experiential properties
      (does the espresso actually taste balanced?). Closing this gap requires integration
      with operational telemetry — sensor data, point-of-sale analytics, customer feedback.
    severity: moderate
    addressable: true

  - description: >
      The customer-first framing of Level 0 reflects the service operations demonstration
      context, not a theoretical claim. Multi-stakeholder Level 0 specifications (patient
      safety + staff wellbeing + regulatory compliance for hospitals) are not investigated.
      Freeman's (1984) stakeholder theory identifies this as a gap.
    severity: moderate
    addressable: true

  - description: >
      The bootstrap problem: how does an organization specify Level 0 customer experience
      goals before operating? In novel service contexts, Level 0 acceptance tests would
      need to be hypothesized and iteratively refined through operational experience.
    severity: minor
    addressable: true

