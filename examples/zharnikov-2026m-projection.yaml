    - "Specification codification ratio measures derived from document analysis or NLP"
    - "Role strain scales (Rizzo, House, & Lirtzman, 1970) administered to position holders"
    - "AI adoption intensity measures for business units or firms"
    - "Organizational chart change tracking over 3+ years for AI-adopting firms"

