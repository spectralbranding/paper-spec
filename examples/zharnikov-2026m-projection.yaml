# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026m): Position as Projection
spec_version: "0.1.0"

meta:
  title: "Position as Projection: A Formal Theory of How Process Requirements Generate Organizational Structure"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19145205"
  date: "2026-03-01"
  version: "1.0"
  venue: "Working Paper (Zenodo); submitted to Journal of Organization Design (JORG-D-26-00036)"
  license: "CC-BY-4.0"
  keywords:
    - organizational design
    - projection operators
    - process space
    - specification transmission
    - functional structure
    - position
    - AI and organization
    - structural contingency theory

claims:
  - id: "D1"
    type: definition
    statement: >
      An organizational position is the image of a projection operator that maps a subset
      of the process space onto a specific agent. The position is defined by (a) the subset
      of processes it encompasses, (b) the function bundle required to execute those processes,
      and (c) the agent to whom it is assigned. Positions are derived quantities, not design
      primitives.
    formal: "x_i = pi_i(P) ⊆ P, where P is the process space and pi_i is the projection operator for agent a_i"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: []

  - id: "D2"
    type: definition
    statement: >
      Every projection operator divides the process space into an image (activities assigned
      to the position) and a kernel (activities not assigned). The organizational chart is
      the union of images across all projection operators. The white space on the org chart
      (Rummler & Brache, 1995) is what falls into the intersection of kernels — activities
      that no projection operator captures.
    formal: "Image(pi_i) = x_i; Kernel(pi_i) = P \\ x_i; White space = ⋂_i Kernel(pi_i)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "D3"
    type: definition
    statement: >
      A specification is an explicit, testable description of what an activity must accomplish.
      Specifications range from fully tacit (embedded in practitioner skill, impossible to
      articulate completely) to fully explicit (codified in a document, database, or executable
      schema transmissible without loss). The derivation chain is:
      Specification → Skill → Function → Position.
    formal: "s in [0,1] where s=0 is fully tacit and s=1 is fully explicit"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "D4"
    type: definition
    statement: >
      The sub-agent decomposition partitions the human agent into three analytically separable
      components: (1) the specification component — instructions and knowledge that determine
      what the agent does; (2) the rendering capacity — the agent's ability to transform
      specifications into output; and (3) the positional context — the process coordinates
      at which the agent is located. Function is a parameter of positional context, not a
      property of the agent.
    formal: "Agent_i = (spec_i, render_i, context_i); Function = f(context_i)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D3"]

  - id: "P1"
    type: proposition
    statement: >
      Reorganizations that change positions (projection operators) without changing processes
      (the process space) will produce smaller sustained improvements in organizational
      performance outcomes than reorganizations accompanied by process redesign, controlling
      for Hawthorne effects and coincidental process changes.
    formal: "E[perf | Δpi, P fixed] < E[perf | Δpi, ΔP] over time horizon T > 6 months"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1"]

  - id: "P2"
    type: proposition
    statement: >
      As specification explicitness increases, functional departments lose control authority
      (the authority to determine how work is performed) while retaining competence-development
      authority (the authority to develop, certify, and maintain skills).
    formal: "dAuthority_control/ds < 0; dAuthority_competence/ds >= 0 where s is specification explicitness"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D3"]

  - id: "P3"
    type: proposition
    statement: >
      The magnitude of the gap between a position's formal function bundle and its actual
      process requirements predicts role strain, job dissatisfaction, and voluntary turnover.
    formal: "RoleStrain ~ beta * Gap(F_i, P_i) + controls"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D3"]

  - id: "P4"
    type: proposition
    statement: >
      In organizations that adopt AI for specification-intensive tasks, positions converge
      toward process nodes as the specification-transmission functions previously provided
      by functional departments are automated. The rate of convergence is proportional to
      the share of the position's function bundle that consists of specification-transmissible
      (rather than judgment-intensive) activities.
    formal: "d(process_alignment)/dt = lambda * (spec_transmissible_share) * AI_adoption"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D3", "D4"]

  - id: "P5"
    type: proposition
    statement: >
      As AI-mediated coordination reduces the cost of managing process interfaces, the
      minimum viable organizational overhead for a given process approaches the specification
      of that process's interfaces — what inputs the process requires, what outputs it
      produces, and what quality standards it must meet.
    formal: "lim_{coordination_cost -> 0} Overhead(P) = Interface_spec(P)"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D3", "D4"]

  - id: "P6"
    type: proposition
    statement: >
      The Lean limit (organizational functions converge toward production through process
      standardization) and the AI limit (organizational functions converge toward specification
      through AI-mediated codification) produce the same structural outcome: the compression
      of functional departments as independent organizational units. Both are instances of
      the same mechanism — making tacit specifications explicit.
    formal: "lim_{lean -> max} Structure = lim_{AI -> max} Structure = process_nodes"
    testable: true
    tested_in_paper: false
    status: not_tested
    depends_on: ["D1", "D3", "D4", "P4"]

methodology:
  type: theoretical
  design: >
    Formal theory construction using linear algebra as the mathematical apparatus. The
    projection operator framework draws on properties of idempotency, image/kernel decomposition,
    and orthogonality to derive organizational predictions. Six propositions are developed
    and positioned against structural contingency theory (Lawrence & Lorsch, 1967; Donaldson,
    2001), the function-process debate (Hammer, 1993; Davenport, 1993), and role theory
    (Katz & Kahn, 1978). No primary empirical data collected.
  analysis:
    method: >
      Conceptual formalization; mathematical proposition derivation; comparative theoretical
      positioning; illustrative cases (Toyota lean production, AI-augmented accounting)
    software: "None"

acceptance:
  - claim_id: "P1"
    criterion: >
      Pre/post longitudinal analysis of reorganizations showing that those accompanied by
      documented process redesign produce significantly larger sustained performance improvements
      (revenue per employee, cycle time, customer satisfaction) than those involving structural
      change only, with a difference significant at p < 0.05 and persisting at 12 months.
    falsification: >
      Reorganizations that change only projection operators (positions, reporting lines) without
      accompanying process redesign show systematic sustained performance improvement at 12 months
      that is not attributable to Hawthorne effects or confounded process changes.

  - claim_id: "P2"
    criterion: >
      Organizations with higher specification codification ratios (proportion of work governed
      by documented procedures) show functional departments with significantly reduced control
      authority scores (as measured by authority surveys) but not significantly reduced
      competence-development authority scores.
    falsification: >
      Specification explicitness is uncorrelated with functional control authority migration,
      or functional departments lose both control and competence-development authority at the
      same rate as specifications become explicit.

  - claim_id: "P4"
    criterion: >
      Longitudinal tracking of organizational charts in AI-adopting firms shows that the ratio
      of function-defined to process-defined positions declines significantly over 3 years,
      with faster decline in business units with higher AI adoption intensity.
    falsification: >
      AI adoption does not predict convergence of positions toward process nodes; the ratio
      of function-defined to process-defined positions is stable or increases in AI-adopting firms.

  - claim_id: "P6"
    criterion: >
      Cross-sectional comparison of functional department size across a 2x2 design (high/low
      Lean maturity x high/low AI adoption) shows that the high-high quadrant exhibits the
      greatest functional compression, with a statistically significant interaction term.
    falsification: >
      Lean maturity and AI adoption have independent additive effects on functional compression
      with no interaction, suggesting they operate through different mechanisms rather than
      both making specifications explicit.

data:
  available: false
  url: ""
  notes: >
    No primary data collected. All propositions are theoretically derived and supported
    by reference to existing empirical literature (Hammer, 1996; Beer & Nohria, 2000;
    McCormack & Johnson, 2001; Rizzo, House, & Lirtzman, 1970). Empirical validation
    is a direction for future research.

code:
  available: false
  url: ""
  notes: >
    The paper is entirely theoretical. No computational tools are used or developed.
    The projection operator formalization uses linear algebra notation but does not
    require software implementation for the paper's claims.

replication:
  feasible: true
  estimated_cost: "< $50,000 USD (organizational survey + archival data access)"
  estimated_time: "12-36 months"
  requirements:
