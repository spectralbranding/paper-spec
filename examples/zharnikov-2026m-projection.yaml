results:
  - claim_id: "P1"
    status: not_tested
    notes: >
      Consistent with existing evidence on reorganization failure rates (Beer & Nohria, 2000;
      Hammer, 1996) but not formally tested. The projection framework provides the theoretical
      explanation; empirical test requires longitudinal study distinguishing process-accompanied
      from process-absent reorganizations.

  - claim_id: "P2"
    status: not_tested
    notes: >
      Directional evidence from McCormack & Johnson (2001) BPO maturity model and Larsen &
      Bjorn-Andersen (2001) longitudinal study. Formal test requires specification codification
      ratio measurement linked to authority survey data.

  - claim_id: "P3"
    status: not_tested
    notes: >
      Role theory literature (Katz & Kahn, 1978; Biddle, 1986; Rizzo, House, & Lirtzman, 1970)
      establishes that role ambiguity and conflict predict dissatisfaction and turnover. The
      projection framework extends this by specifying the structural source (position-process gap).
      Direct test of the gap measure is absent.

  - claim_id: "P4"
    status: not_tested
    notes: >
      Practitioner descriptions of AI-driven decoupling of function from position (Sukharevsky
      et al., 2025; McKinsey agentic organization) are directionally consistent. Formal
      longitudinal test with organizational chart tracking data has not been conducted.

  - claim_id: "P5"
    status: not_tested
    notes: >
      Simon's (1962) near-decomposability principle provides theoretical support. AI coordination
      cost reduction is documented (Klein & Wieczorek, 2026) but position compression as the
      organizational consequence has not been formally measured.

  - claim_id: "P6"
    status: not_tested
    notes: >
      The Lean-AI equivalence claim is novel. Toyota and other Lean manufacturers provide
      illustrative support for the Lean limit. The 2x2 design for testing the interaction
      has not been executed.

limitations:
  - description: >
      The framework assumes activities can be represented as a well-defined, enumerable set
      forming a structured space. In practice, organizational activities are often ambiguous,
      overlapping, and politically contested. The framework's predictions are strongest where
      process boundaries are relatively clear (manufacturing, logistics, standardized services)
      and weakest where they are contested (creative industries, political organizations).
    severity: major
    addressable: true

  - description: >
      The choice of linear algebra as the formalism presupposes that projection operators
      adequately capture the process-to-position relationship. Nonlinear, network-based,
      or categorical mappings may be more appropriate for some organizational contexts.
      The framework is a first-order approximation.
    severity: moderate
    addressable: true

  - description: >
      The framework does not apply where institutional mandates require functional structure
      independently of specification tacitness — public sector organizations, regulated
      industries, and constitutionally structured entities. Institutional isomorphism
      (DiMaggio & Powell, 1983) is a genuine competing explanation outside this scope.
    severity: moderate
    addressable: false

  - description: >
      All empirical support is indirect — drawn from existing studies that are consistent
      with the framework's predictions but were not designed to test the projection formalization
      specifically. No primary data were collected.
    severity: major
    addressable: true

  - description: >
      The Polanyi strong interpretation — that some knowledge is in principle inarticulable
      — creates a permanent floor for functional structure that the framework cannot predict
      the height of. Where the tacit boundary sits for any specific domain is an empirical
      question the theory does not answer.
    severity: minor
    addressable: true

