results:
  - claim_id: "P1"
    status: not_tested
    notes: >
      Consistent with Hogarth & Einhorn (1992), Smith & Vogt (1995), and Asch (1946),
      all of which demonstrate order effects in belief and impression formation. These
      studies were not designed to test non-ergodicity; consistency is not confirmation.

  - claim_id: "P2"
    status: not_tested
    notes: >
      Consistent with Slovic's (1993) trust asymmetry principle and with accumulated
      brand crisis evidence (VW, Boeing). No study has directly measured absorption
      rates or tested irreversibility of negative conviction.

  - claim_id: "P3"
    status: not_tested
    notes: >
      Indirect evidence from panel attrition patterns in brand tracking (negatively
      disposed respondents drop out) and NPS bimodality. Direct longitudinal test
      with individual-level time averages not yet conducted.

  - claim_id: "P4"
    status: not_tested
    notes: >
      Consistent with Kardes & Kalyanaram (1992) order-of-entry effects and Tversky
      & Kahneman (1974) anchoring heuristic. No study has tracked first-signal influence
      across all 8 SBT dimensions.

  - claim_id: "P5"
    status: not_tested
    notes: >
      Consistent with Grier & Brumbaugh (1999) target/non-target market perception
      divergence and Puntoni et al. (2011) bilingual processing differences. No study
      has tracked cohort trajectories over time using SBT-defined observer spectral profiles.

  - claim_id: "C1"
    status: not_tested
    notes: >
      Empirically testable via log-linear vs. linear model comparison on panel data.
      No such test conducted. Additive updating is the implicit assumption of classical
      brand tracking (Keller 1993, Aaker 1991); C1 proposes the multiplicative alternative.

limitations:
  - description: >
      No primary data collected. All five propositions are theoretically derived and
      supported by existing evidence generated for other purposes. No study has directly
      tested non-ergodicity in brand perception or measured the absorbing-state property.
    severity: major
    addressable: true

  - description: >
      The propositions are derived from the SBT framework and its specific
      8-dimensional structure. Empirical validation of SBT's dimensionality (Zharnikov
      2026a) is ongoing; the non-ergodic framework inherits this limitation.
    severity: major
    addressable: true

  - description: >
      The framework is scoped to B2C brand perception. B2B contexts involve committee
      purchasing decisions, formal evaluation processes, and contractual reset points
      that may introduce ergodicity-restoring mechanisms. Extension to B2B requires
      additional analysis.
    severity: moderate
    addressable: true

  - description: >
      The multiplicative sufficiency conditions C1-C3 are independently sufficient but
      the paper does not specify which conditions hold in practice or how to test which
      regime applies in a given market context. The boundary between multiplicative and
      additive regimes is described theoretically but not operationally specified.
    severity: moderate
    addressable: true

