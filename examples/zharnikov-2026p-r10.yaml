results:
  - claim_id: "P1"
    status: supported
    notes: >
      Dove's Ideological dimension transitioned from null (2003) to 8.0 (2006), producing
      explosive revenue growth from ~$2B to ~$4B (2004-2007). Contrast cases (Pepsi 2017,
      Gillette 2019) activated occupied or contradicted dimensions and produced negative
      outcomes. Analysis is interpretive; no causal identification.

  - claim_id: "P2"
    status: supported
    notes: >
      Four structurally distinct perception clouds identified from published studies:
      Purpose-Aligned (Ideological dominant, positive conviction), Product-Pragmatist
      (Experiential/Economic dominant, brand irrelevant to values), Social-Signal Reader
      (Social dominant, campaign as social currency), Skeptic-Critic (Ideological
      dominant, negative conviction on corporate coherence). Cohort profiles drawn from
      Georgeson (2018) and Garick (2023), not from direct SBT measurement.

  - claim_id: "P3"
    status: supported
    notes: >
      Murray (2013) genderwashing analysis and Garick (2023) YouTube data (70% negative
      on Dove-as-corporation) are consistent with portfolio interference. Awareness gate
      dynamics documented through investigative journalism and social media dissemination
      of Dove-Axe ownership information. Causal isolation of awareness effect not established.

  - claim_id: "P4"
    status: supported
    notes: >
      Cultural dimension score declined from 8.5 (2006) to 5.5 (2023) in author's
      assessment, corresponding to body positivity becoming mainstream. Pattern is
      consistent with P4's inverted-U prediction. Empirical measurement of cultural
      distinctiveness over time not conducted.

  - claim_id: "P5"
    status: supported
    notes: >
      Revenue correlates with dimensional activation events (2004-2007 Ideological
      activation; 2023 Experiential + Ideological refresh), not with spend increases
      during 2013-2019 maintenance period. Ogilvy analysis cited: Oprah partnership
      ($6.02/dollar) exceeded masterbrand advertising ($3.40/dollar) despite lower spend.
      Correlation does not establish causation; confounds acknowledged.

limitations:
  - description: >
      Emission intensity scores in Table 1 are author-assessed from qualitative review
      of secondary sources. No coding protocol, second coder, or inter-rater reliability
      metric was applied. Formal empirical validation requires multi-dimensional survey
      instruments applied to representative observer samples.
    severity: major
    addressable: true

  - description: >
      Cohort identification draws on existing academic studies (Georgeson 2018, Garick
      2023) not designed to test SBT predictions. Dedicated cohort identification studies
      using SBT's 8-dimensional instrument and cluster analysis have not been conducted.
    severity: major
    addressable: true

  - description: >
      Financial analysis establishes correlation between dimensional activation events
      and revenue growth. Confounds (general market growth, competitive dynamics,
      distribution expansion) cannot be ruled out without granular econometric analysis.
    severity: moderate
    addressable: true

  - description: >
      All academic sources are English-language and anchored in US/UK cultural contexts.
      Dove operates globally; South Asia portfolio contradiction (Dove vs. Fair & Lovely/
      Glow & Lovely) involves different cultural dynamics. Cross-cultural replication
      is a priority.
    severity: moderate
    addressable: true

  - description: >
      The portfolio interference model is presented in simplified form. A full treatment
      would require modeling how corporate awareness propagates through social networks,
      interacts with prior conviction strength, and decays over time.
    severity: minor
    addressable: true

