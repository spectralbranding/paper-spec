# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026p): The Spectral Anatomy of Purpose — Dove Case Study
spec_version: "0.1.0"

meta:
  title: "The Spectral Anatomy of Purpose: A Longitudinal Analysis of Dove Real Beauty Through Multi-Dimensional Brand Perception Theory"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "10.5281/zenodo.19139258"
