# paper.yaml — Paper Spec v0.1.0
# Zharnikov (2026w): Canon as Repository — Specification-Driven Architecture for Transmedia IP
spec_version: "0.1.0"

meta:
  title: "Canon as Repository: A Specification-Driven Architecture for Transmedia Intellectual Property"
  authors:
    - name: "Zharnikov, Dmitry"
      orcid: "0009-0000-6893-9231"
      affiliation: "Independent Researcher"
  doi: "PENDING"  # Zenodo upload required
  date: "2026-03-30"
  version: "1.0"
  venue: "Convergence (SAGE) — target, not yet submitted"
  license: "CC-BY-NC-ND-4.0"
