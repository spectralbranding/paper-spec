claims:
  - id: "P1"
    type: proposition
    statement: >
      Identity verification technologies emerge discontinuously in response to changes
      in the dominant observer type. Each transition produces a technology optimized for
      the new observer's verification capabilities.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "P2"
    type: proposition
    statement: >
      The current transition from human to AI observers constitutes the sixth observer
      transition in the historical pattern, predicting a shift from visual-emotional
      identity technologies (logos) to machine-verifiable behavioral specifications
      (cryptographic signatures on Brand Functions).
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["P1"]

  - id: "P3"
    type: proposition
    statement: >
      AI agents form brand representations through statistical co-occurrence rather
      than perceptual processing, creating systematic biases (frequency bias, market
      dominance bias, recency bias) that are structurally different from human
      perceptual biases and cannot be addressed by human-oriented brand identity tools.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: []

  - id: "P4"
    type: proposition
    statement: >
      A Brand Function -- f(query, context, observer_type, time) -> response --
      provides a complete behavioral specification that enables coherence verification,
      perception measurement, and cross-touchpoint consistency in ways that existing
      machine-readable brand protocols (brand.json, Brando Schema) cannot.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["P3"]

  - id: "P5"
    type: proposition
    statement: >
      In autonomous commerce where AI agents transact without human oversight,
      cryptographic attestation of behavioral claims becomes the primary trust
      mechanism, replacing reputation-based trust that requires accumulated human
      experience.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["P2", "P4"]

  - id: "P6"
    type: proposition
    statement: >
      Behavioral metamerism -- where brands with identical statistical profiles
      exhibit structurally different behavioral signatures -- represents a form of
      brand confusion that statistical optimization (including GEO) cannot detect
      or resolve, requiring behavioral specification for disambiguation.
    testable: true
    tested_in_paper: false
    status: proposed
    depends_on: ["P4"]

